<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşık Veysel Etkinliği - TÜBİTAK</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e3f2fd; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; border: 2px solid #2196f3; }
        #login-area { display: block; }
        #game-area { display: none; }
        h2 { color: #1565c0; margin-top: 0; user-select: none; padding: 10px; }
        .progress { font-size: 14px; color: #1976d2; margin-bottom: 10px; font-weight: bold; }
        .hint-box { font-size: 28px; letter-spacing: 6px; color: #0d47a1; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; font-family: monospace; }
        input { width: 100%; padding: 15px; border: 2px solid #90caf9; border-radius: 12px; font-size: 18px; margin-bottom: 15px; text-align: center; outline: none; }
        button { background: #1e88e5; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #1565c0; }
        #message { font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Aşık Veysel Etkinliği</h2>

    <!-- GİRİŞ EKRANI -->
    <div id="login-area">
        <p>Hoş geldiniz, isminizi giriniz:</p>
        <input type="text" id="playerName" placeholder="Adınız Soyadınız..." autocomplete="off">
        <button onclick="startGame()">OYUNA BAŞLA</button>
        <p style="font-size: 10px; color: #777; margin-top: 10px;">* Giriş bilgileriniz bulut sistemine kaydedilir.</p>
    </div>

    <!-- OYUN EKRANI -->
    <div id="game-area">
        <div id="progress" class="progress">Soru: 1 / 3</div>
        <div id="welcome-msg" style="color:#0d47a1; margin-bottom:10px; font-weight:bold;"></div>
        <div id="sentence" style="font-style:italic; margin-bottom:20px; color:#333;"></div>
        <div id="hintDisplay" class="hint-box"></div>
        <input type="text" id="userInput" placeholder="Cevabı yaz..." autocomplete="off">
        <button onclick="checkAnswer()">KONTROL ET</button>
        <p id="message"></p>
    </div>
</div>

<script>
    let userName = "";
    const questions = [
        { s: "\"Uzun ince bir ____ gidiyorum, gündüz gece.\"", c: "yoldayım" },
        { s: "Aşık Veysel'in sadık yâri: \"Kara ____\".", c: "toprak" },
        { s: "Aşık Veysel bir halk ____.", c: "ozanıdır" }
    ];
    let step = 0;
    let hints = 0;

    // --- BULUT KAYIT SİSTEMİ (GOOGLE FORMS) ---
    function sendToGoogle(name) {
        const FORM_ID = "1v6vz4rmkLOsbHRr_K9ZsfyiChGq-Icj6VZjG-guVt7M"; 
        const ENTRY_ID = "entry.686330562";
        
        // Form gönderim URL'si
        const url = `https://docs.google.com{FORM_ID}/formResponse?${ENTRY_ID}=${encodeURIComponent(name)}&submit=Submit`;
        
        // Arka planda veriyi gönder (no-cors tarayıcı güvenliği içindir, veri her türlü gider)
        fetch(url, { mode: 'no-cors' })
        .then(() => console.log("Veri buluta gönderildi."))
        .catch(e => console.error("Hata:", e));
    }

    function startGame() {
        const n = document.getElementById('playerName').value.trim();
        if (n.length < 2) return alert("Lütfen isminizi tam yazın.");
        
        userName = n;
        
        // Veriyi hem yerel tarayıcıya hem de Google Form'a gönderiyoruz
        sendToGoogle(userName);
        
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        loadNext();
    }

    function loadNext() {
        if (step < questions.length) {
            hints = 0;
            document.getElementById('progress').innerText = `Soru: ${step + 1} / ${questions.length}`;
            document.getElementById('welcome-msg').innerText = `Hoş geldin ${userName}`;
            document.getElementById('sentence').innerText = questions[step].s;
            document.getElementById('userInput').value = "";
            document.getElementById('userInput').disabled = false;
            document.getElementById('message').innerText = "";
            drawHint();
        } else {
            document.getElementById('game-area').innerHTML = `<h2>Tebrikler ${userName}!</h2><p>Dostlar seni hatırlasın...</p><button onclick="location.reload()">Yeniden Başlat</button>`;
        }
    }

    function drawHint() {
        const target = questions[step].c;
        let h = "";
        for (let i = 0; i < target.length; i++) h += (i < hints) ? target[i] : "_";
        document.getElementById('hintDisplay').innerText = h;
    }

    function checkAnswer() {
        const val = document.getElementById('userInput').value.toLowerCase().trim();
        const target = questions[step].c;

        if (val === target) {
            document.getElementById('message').innerText = "Doğru! 🎉";
            document.getElementById('message').style.color = "green";
            setTimeout(() => { step++; loadNext(); }, 1500);
        } else {
            hints++;
            drawHint();
            if (hints >= target.length) {
                document.getElementById('message').innerText = `Cevap: ${target.toUpperCase()}`;
                setTimeout(() => { step++; loadNext(); }, 2500);
            } else {
                document.getElementById('message').innerText = "Yanlış, ipucu eklendi.";
                document.getElementById('message').style.color = "red";
            }
        }
    }

    // ENTER tuşu desteği
    document.getElementById("playerName").onkeyup = (e) => { if(e.key === "Enter") startGame(); };
    document.getElementById("userInput").onkeyup = (e) => { if(e.key === "Enter") checkAnswer(); };

</script>
</body>
</html>
