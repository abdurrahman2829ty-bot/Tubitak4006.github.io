<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Ses Çalar</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: -apple-system, sans-serif;
        }

        .player-card {
            background: #1c1c1e;
            width: 95%;
            max-width: 400px;
            padding: 30px 15px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            height: 120px;
            overflow: hidden;
            border-radius: 15px;
            background: #2c2c2e;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            color: #8e8e93;
            font-size: 11px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="player-card">

    <div class="icon">🎧</div>
    <h2>Ses Dosyanız</h2>

    <!-- SADECE DRIVE PLAYER -->
    <div class="iframe-container">
        <iframe src="https://drive.google.com/file/d/1Wcr_BqeF899C57AzWkYjo4VfjEuIGZlF/preview" allow="autoplay"></iframe>
    </div>

    <div class="footer">GOOGLE DRIVE PLAYER</div>

</div>

</body>
</html>
