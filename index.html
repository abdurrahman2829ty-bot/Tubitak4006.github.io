<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tübitak 4006 - Şiir Etkinliği</title>

    <style>
        body {
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #121212; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        @keyframes rotateIcon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* GİRİŞ EKRANI (İSİM SORMA) */
        #loginSection {
            background: #3a3a3c;
            width: 90%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #48484a;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease-out;
        }

        #userNameInput {
            width: 80%;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #48484a;
            background: #2c2c2e;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }

        /* ANA İÇERİK (BAŞLANGIÇTA GİZLİ) */
        #mainContent {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        /* KARTLAR */
        .player-card, .quiz-card {
            background: #3a3a3c; 
            width: 90%;
            max-width: 380px;
            padding: 35px 20px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #48484a;
            animation: fadeIn 0.8s ease-out forwards;
            margin-bottom: 25px;
        }

        .quiz-card { display: none; }

        /* LOGOLAR */
        .image-container { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 15px; }
        .image-container img { width: 75px; height: 75px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }

        .top-title { color: #aeaeb2; font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .icon { font-size: 50px; margin-bottom: 10px; display: inline-block; animation: rotateIcon 4s linear infinite; }
        
        #welcomeMessage { color: #ff9f0a; font-weight: 600; margin-bottom: 10px; font-size: 1.1rem; }
        h2 { color: #ffffff; margin: 5px 0 25px; font-size: 1.4rem; }

        /* PLAYER */
        .iframe-container { position: relative; width: 100%; height: 85px; overflow: hidden; border-radius: 20px; background: #2c2c2e; border: 1px solid #48484a; margin-bottom: 20px; }
        iframe { width: 100%; height: 140px; border: none; transform: translateY(-33px); }

        /* BUTONLAR */
        .primary-btn { background: #007aff; color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 90%; }
        .primary-btn:hover { background: #005ecb; }

        /* QUIZ TASARIMI */
        .quiz-title { color: #ff9f0a; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .question-box { text-align: left; margin-bottom: 20px; padding: 15px; background: #2c2c2e; border-radius: 20px; }
        .question-text { color: #fff; font-size: 15px; margin-bottom: 12px; }
        .option { background: #48484a; color: #d1d1d6; padding: 12px; border-radius: 12px; font-size: 14px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        
        .correct { background: #34c759 !important; color: white !important; }
        .wrong { background: #ff3b30 !important; color: white !important; }

    </style>
</head>

<body>

    <!-- GİRİŞ EKRANI -->
    <div id="loginSection">
        <div class="icon">👋</div>
        <h2 style="margin-bottom: 20px;">Hoş Geldiniz</h2>
        <p style="color: #aeaeb2; margin-bottom: 20px;">Lütfen isminizi giriniz:</p>
        <input type="text" id="userNameInput" placeholder="Adınız Soyadınız">
        <button class="primary-btn" onclick="startExperience()">Başla</button>
    </div>

    <!-- ANA İÇERİK (DİNLEME VE ETKİNLİK) -->
    <div id="mainContent">
        <div class="player-card">
            <div class="image-container">
                <img src="https://i.ibb.co/xqmTz8xx/Milli-E-itim-Bakanl-Logo-svg.png" alt="MEB Logo">
                <img src="https://i.ibb.co/0VtKGr55/images-1-1.png" alt="Tübitak Logo">
            </div>
            <div class="top-title">Tübitak 4006</div>
            
            <!-- HOŞ GELDİN MESAJI -->
            <div id="welcomeMessage"></div>
            
            <div class="icon">🎵</div>
            <h2>Şiiri Dinle</h2>
            <div class="iframe-container">
                <iframe src="https://drive.google.com/file/d/1Wcr_BqeF899C57AzWkYjo4VfjEuIGZlF/preview"></iframe>
            </div>
            <button class="primary-btn" onclick="showQuiz()">Dinleme Bitti: Etkinliğe Başla</button>
        </div>

        <div id="quizSection" class="quiz-card">
            <div class="quiz-title">📝 Şiir Etkinliği</div>
            <div class="question-box">
                <div class="question-text">1. Şiirde hangi duygu ağır basmaktadır?</div>
                <div class="option" onclick="checkAnswer(this, false)">A) Ayrılık acısı</div>
                <div class="option" onclick="checkAnswer(this, true)">B) Memleket sevgisi</div>
                <div class="option" onclick="checkAnswer(this, false)">C) Doğa korkusu</div>
            </div>
            <div class="question-box">
                <div class="question-text">2. Şair geleceği kime emanet etmektedir?</div>
                <div class="option" onclick="checkAnswer(this, false)">A) Geçmişe</div>
                <div class="option" onclick="checkAnswer(this, false)">B) Yaşlılara</div>
                <div class="option" onclick="checkAnswer(this, true)">C) Gençlere</div>
            </div>
        </div>
    </div>

    <script>
        function startExperience() {
            const name = document.getElementById('userNameInput').value;
            if (name.trim() !== "") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                document.getElementById('welcomeMessage').innerText = "Hoş geldin, " + name + "!";
            } else {
                alert("Lütfen bir isim giriniz.");
            }
        }

        function showQuiz() {
            const quiz = document.getElementById('quizSection');
            quiz.style.display = 'block';
            quiz.scrollIntoView({ behavior: 'smooth' });
        }

        function checkAnswer(element, isCorrect) {
            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
            }
        }
    </script>

</body>
</html>
