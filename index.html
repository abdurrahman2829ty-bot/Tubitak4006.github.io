<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Ses Çalar - Eşit Logolu</title>

    <style>
        /* GENEL DIŞ ARKA PLAN */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #121212; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* DÖNME ANİMASYONU */
        @keyframes rotateIcon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* GİRİŞ ANİMASYONU */
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* OYNATICI KARTI (KAPALI GRİ) */
        .player-card {
            background: #3a3a3c; 
            width: 90%;
            max-width: 380px;
            padding: 35px 20px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #48484a;
            animation: cardAppear 0.8s ease-out forwards;
        }

        /* LOGOLAR (BOYUTLARI EŞİTLENDİ) */
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center; /* Dikeyde hizalar */
            gap: 20px; 
            margin-bottom: 20px;
        }

        .image-container img {
            width: 60px;  /* Genişlik sabit */
            height: 60px; /* Yükseklik sabit */
            object-fit: contain; /* Logo boyutları farklı olsa bile kutuya sığdırır */
            border: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); 
        }

        /* DÖNEN MÜZİK İKONU */
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: rotateIcon 4s linear infinite;
        }

        /* YAZILAR */
        h2 {
            color: #ffffff; 
            margin: 10px 0 25px;
            font-size: 1.3rem;
            font-weight: 500;
        }

        /* DRIVE PLAYER ALANI */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 85px;
            overflow: hidden;
            border-radius: 20px;
            background: #2c2c2e;
            border: 1px solid #48484a;
        }

        iframe {
            width: 100%;
            height: 140px;
            border: none;
            transform: translateY(-33px);
        }

        .footer {
            color: #aeaeb2;
            font-size: 11px;
            margin-top: 25px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

<div class="player-card">

    <!-- LOGOLAR -->
    <div class="image-container">
        <!-- İki logo da 70x70 kutucuklara tam eşit şekilde yerleşir -->
        <img src="konya.png" alt="Konya Logo">
        <img src="meb.png" alt="Tübitak Logo">
    </div>

    <!-- DÖNEN MÜZİK NOTASI -->
    <div class="icon">🎵</div>
    
    <h2>Ses Dosyanız</h2>

    <!-- DRIVE PLAYER -->
    <div class="iframe-container">
        <iframe src="https://drive.google.com/file/d/1Wcr_BqeF899C57AzWkYjo4VfjEuIGZlF/preview"></iframe>
    </div>

    <div class="footer">Audio Player System</div>

</div>

</body>
</html>
