<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Ses Çalar - Kurumsal</title>

    <style>
        /* GENEL DIŞ ARKA PLAN */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #121212; /* Dış alan siyah/koyu */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* DÖNME ANİMASYONU */
        @keyframes rotateIcon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* GİRİŞ ANİMASYONU */
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* OYNATICI KARTI (KAPALI GRİ / ANTRASİT) */
        .player-card {
            background: #3a3a3c; /* İstediğin kapalı gri tonu */
            width: 90%;
            max-width: 380px;
            padding: 35px 20px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #48484a;
            animation: cardAppear 0.8s ease-out forwards;
        }

        /* LOGOLAR (BOYUTLAR EŞİTLENDİ) */
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .image-container img {
            width: 75px;  /* Logolar için ideal genişlik */
            height: 75px; /* Logolar için ideal yükseklik */
            object-fit: contain; /* Oranları bozmadan sığdırır */
            border: none;
            /* Logoların koyu zeminde daha net durması için hafif parlaklık */
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }

        /* DÖNEN MÜZİK İKONU */
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: rotateIcon 4s linear infinite;
        }

        /* YAZILAR */
        h2 {
            color: #ffffff; 
            margin: 10px 0 25px;
            font-size: 1.4rem;
            font-weight: 500;
        }

        /* DRIVE PLAYER ALANI */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 85px;
            overflow: hidden;
            border-radius: 20px;
            background: #2c2c2e; /* Player alanı bir tık daha koyu */
            border: 1px solid #48484a;
        }

        iframe {
            width: 100%;
            height: 140px;
            border: none;
            transform: translateY(-33px);
        }

        .footer {
            color: #aeaeb2;
            font-size: 11px;
            margin-top: 25px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

<div class="player-card">

    <!-- GÜNCEL VE HERKESE AÇIK LOGOLAR -->
    <div class="image-container">
        <img src="https://i.ibb.co/xqmTz8xx/Milli-E-itim-Bakanl-Logo-svg.png" alt="MEB Logo">
        <img src="https://i.ibb.co/0VtKGr55/images-1-1.png" alt="Tübitak Logo">
    </div>

    <!-- DÖNEN MÜZİK NOTASI -->
    <div class="icon">🎵</div>
    
    <h2>Ses Dosyanız</h2>

    <!-- DRIVE PLAYER -->
    <div class="iframe-container">
        <iframe src="https://drive.google.com/file/d/1Wcr_BqeF899C57AzWkYjo4VfjEuIGZlF/preview"></iframe>
    </div>

    <div class="footer">Eğitim ve Teknoloji Sistemi</div>

</div>

</body>
</html>
