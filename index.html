
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kuş Sesi</title>

<style>
body {
  background-color: #1e1e1e;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 100px;
}

.container {
  background: #2c2c2c;
  padding: 30px;
  border-radius: 15px;
  display: inline-block;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background-color: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #45a049;
}
</style>
</head>

<body>

<div class="container">
  <h2>🐦 Muhabbet Kuşu Sesi</h2>

  <audio id="ses">
    <source src="muhabbet.mp3.mp3" type="audio/mpeg">
  </audio>

  <br>

  <button onclick="oynat()">🔊 Oynat</button>
  <button onclick="dur()">⏸️ Durdur</button>
</div>

<script>
function oynat() {
  document.getElementById("ses").play();
}

function dur() {
  document.getElementById("ses").pause();
}
</script>

</body>
