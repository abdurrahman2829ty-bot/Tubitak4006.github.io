<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tübitak 4006 - Akıllı Şiir</title>
    <style>
        :root { 
            --bg: #000000; 
            --card: rgba(28, 28, 30, 0.7); 
            --accent: #0071e3; 
            --text: #f5f5f7; 
            --gray: #86868b;
            --success: #30d158;
        }

        body { 
            margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: var(--text); overflow-x: hidden; display: flex; justify-content: center;
            touch-action: manipulation; /* Çift tıklama yakınlaştırmasını kapatır */
        }

        @keyframes appleIntro {
            0% { opacity: 0; transform: scale(1.1) translateY(40px); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
        }

        .container {
            width: 100%; max-width: 400px; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        .logo-container {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            margin-bottom: 25px; animation: appleIntro 1.2s cubic-bezier(0.15, 0, 0.2, 1) forwards;
        }
        .logo-box {
            width: 70px; height: 70px; 
            border-radius: 18px; background: rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .logo-box img { width: 75%; height: 75%; object-fit: contain; }

        .card { 
            background: var(--card); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            width: 100%; padding: 35px 25px; border-radius: 32px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.12); box-sizing: border-box;
            animation: appleIntro 1s cubic-bezier(0.15, 0, 0.2, 1) forwards;
            margin-bottom: 15px;
        }

        input { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; 
            background: rgba(255,255,255,0.1); color: white; 
            margin-bottom: 20px; text-align: center; font-size: 16px; /* 16px altı mobilde zoom yapar */
            transition: all 0.4s ease; box-sizing: border-box;
            -webkit-appearance: none; /* iOS gölgesini kaldırır */
        }
        input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 0 3px var(--accent); outline: none; }

        .btn { 
            background: var(--accent); color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 600; 
            width: 100%; cursor: pointer; font-size: 17px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        .player-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 12px; margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        iframe { width: 100%; height: 65px; border-radius: 12px; border: none; filter: invert(0.9) hue-rotate(180deg); }

        .option { 
            background: rgba(255,255,255,0.06); padding: 18px; border-radius: 16px; 
            margin-bottom: 12px; cursor: pointer; text-align: left; 
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        .option:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }

        .correct { background: var(--success) !important; color: white; }
        .wrong { background: #ff453a !important; color: white; }
        .disabled { pointer-events: none; opacity: 0.6; }

        .admin-trigger { 
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
            width: 60px; height: 5px; cursor: pointer; z-index: 1000; 
            background: rgba(255,255,255,0.1); border-radius: 10px;
        }

        #adminPanel { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(28, 28, 30, 0.98); 
            backdrop-filter: blur(50px); width: 92%; max-width: 400px; 
            border-radius: 30px; padding: 25px; border: 1px solid var(--accent); 
            z-index: 2000; box-shadow: 0 0 80px rgba(0,0,0,0.9);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="loginAdmin()"></div>

    <div id="adminPanel">
        <h2 style="margin-top:0; color:var(--accent); font-size: 22px;">📊 Panel</h2>
        <div id="adminTableBody" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px; font-size: 14px;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#333; padding: 12px;" onclick="closeAdmin()">Kapat</button>
            <button class="btn" style="padding: 12px;" onclick="loadCloudData()">Veri Çek</button>
        </div>
    </div>

    <div class="container">
        <div class="logo-container">
            <div class="logo-box"><img src="https://i.ibb.co/xqmTz8xx/Milli-E-itim-Bakanl-Logo-svg.png
"></div>
            <div class="logo-box"><img src="https://i.ibb.co/0VtKGr55/images-1-1.png
"></div>
        </div>

        <div id="loginCard" class="card">
            <h1 style="font-size: 30px; font-weight: 700; letter-spacing: -1px; margin: 0 0 5px 0;">Akıllı Şiir</h1>
            <p style="color:var(--gray); margin-bottom:30px; font-size: 17px;">TÜBİTAK 4006 Deneyimi</p>
            <input type="text" id="userName" placeholder="Adınız Soyadınız">
            <button class="btn" onclick="startExperience()">Başlat</button>
        </div>

        <div id="mainContent" style="display:none; width:100%;">
            <div class="card">
                <h2 id="welcomeMessage" style="font-size: 20px; margin-bottom: 5px;"></h2>
                <div class="player-wrapper">
                    <p style="font-size: 11px; color: var(--gray); margin-bottom: 10px; font-weight: 700; letter-spacing: 1px;">ŞİİRİ DİNLE</p>
                    <iframe src="https://drive.google.com/file/d/1Wcr_BqeF899C57AzWkYjo4VfjEuIGZlF/preview
"></iframe>
                </div>
                <button id="startQuizBtn" class="btn" onclick="showQuestion()">Dinleme Tamamlandı</button>
            </div>
            <div id="quizFlow"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzk4JE8bht6GpZ4u7y_wHcnhl64_uZZJ34HrVXIiMxk7FfYgdDHWgL7B8ZRHPHRRFLX/exec"; 
        let user = "", score = 0, current = 0;
        const questions = [
            { q: "Şiirde hangi duygu ağır basmaktadır?", o: ["Ayrılık", "Memleket Sevgisi", "Korku"], c: 1 },
            { q: "Şair geleceği kime emanet ediyor?", o: ["Geçmişe", "Yaşlılara", "Gençlere"], c: 2 },
            { q: "Projenin ana amacı nedir?", o: ["Eğlence", "Bilim ve Sanat", "Spor"], c: 1 },
            { q: "Şiirdeki ana mekan neresidir?", o: ["Vatan", "Uzay", "Fabrika"], c: 0 },
            { q: "Şairin genel tavrı nasıldır?", o: ["Ümitsiz", "Umutlu ve Kararlı", "Kızgın"], c: 1 }
        ];

        function startExperience() {
            user = document.getElementById('userName').value.trim();
            if(!user) return;
            const login = document.getElementById('loginCard');
            login.style.transition = "all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)";
            login.style.opacity = "0";
            login.style.transform = "scale(0.95) translateY(-20px)";
            setTimeout(() => {
                login.style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('welcomeMessage').innerText = "Hoş Geldin, " + user;
            }, 600);
        }

        function showQuestion() {
            document.getElementById('startQuizBtn').style.display = "none";
            const q = questions[current];
            const flow = document.getElementById('quizFlow');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <p style="color:var(--accent); font-weight:700; font-size:11px;">SORU ${current+1} / 5</p>
                <h3 style="text-align:left; font-size:20px; margin: 15px 0; line-height: 1.3;">${q.q}</h3>
                ${q.o.map((o, i) => `<div class="option" onclick="handleAnswer(this, ${i}, ${q.c})">${o}</div>`).join('')}
            `;
            flow.appendChild(card);
            setTimeout(() => {
                const rect = card.getBoundingClientRect();
                window.scrollTo({ top: window.pageYOffset + rect.top - 20, behavior: 'smooth' });
            }, 100);
        }

        function handleAnswer(btn, selected, correct) {
            btn.parentElement.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
            if(selected === correct) { btn.classList.add('correct'); score += 20; } 
            else { btn.classList.add('wrong'); btn.parentElement.querySelectorAll('.option')[correct].classList.add('correct'); }
            
            current++;
            setTimeout(() => {
                if(current < questions.length) showQuestion();
                else finishQuiz();
            }, 800);
        }

        function finishQuiz() {
            const code = Math.floor(1000 + Math.random() * 9000);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-size: 45px; margin-bottom: 15px;">🎉</div>
                <h2 style="font-size: 26px;">Bitti!</h2>
                <p>Puanın: <b style="font-size:22px;">${score}</b></p>
                <div style="margin: 25px 0; padding: 20px; background: rgba(255,255,255,0.06); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);">
                    <p style="font-size: 12px; color: var(--gray); margin-bottom: 5px;">KATILIM KODUN</p>
                    <span style="font-size: 34px; font-weight: 800; color: var(--accent);">${code}</span>
                </div>
            `;
            document.getElementById('quizFlow').appendChild(card);
            setTimeout(() => card.scrollIntoView({ behavior: 'smooth' }), 100);
            if(SCRIPT_URL.length > 10) fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({name: user, score: score, code: code}) });
        }

        function loginAdmin() {
            if(prompt("Şifre:") === "4006") document.getElementById('adminPanel').style.display = 'block';
        }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        async function loadCloudData() {
            const body = document.getElementById('adminTableBody');
            body.innerHTML = "Çekiliyor...";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                body.innerHTML = data.slice(1).reverse().map(row => 
                    `<div style="padding:10px; border-bottom:1px solid #333; margin-bottom:5px;"><b>${row}</b> - ${row} Puan</div>`).join('');
            } catch(e) { body.innerHTML = "Hata!"; }
        }
    </script>
</body>
</html>
