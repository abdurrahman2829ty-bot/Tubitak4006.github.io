<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşık Veysel Etkinliği - Mavi Tema</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e3f2fd; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; border: 2px solid #2196f3; margin-bottom: 20px; }
        
        #login-area { display: block; }
        #game-area { display: none; }

        h2 { color: #1565c0; margin-top: 0; }
        .progress { font-size: 14px; color: #1976d2; margin-bottom: 10px; font-weight: bold; }
        
        #sentence { font-size: 18px; margin-bottom: 20px; color: #333; min-height: 60px; line-height: 1.5; font-style: italic; }
        .hint-box { font-size: 28px; letter-spacing: 6px; color: #0d47a1; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; font-family: monospace; }
        
        input { width: 100%; padding: 15px; border: 2px solid #90caf9; border-radius: 12px; font-size: 18px; margin-bottom: 15px; outline: none; text-align: center; background: #f1f8fe; transition: 0.3s; }
        input:focus { border-color: #2196f3; background: #fff; }
        
        button { background: #1e88e5; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #1565c0; }
        button:active { transform: scale(0.98); }
        
        #message { margin-top: 15px; font-weight: bold; font-size: 16px; }

        /* Yönetici Paneli */
        #admin-panel { width: 100%; max-width: 400px; background: #cfd8dc; padding: 15px; border-radius: 12px; display: none; margin-top: 20px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .admin-btn { background: #546e7a; font-size: 12px; padding: 8px; margin-top: 20px; width: auto; opacity: 0.7; }
        ul { text-align: left; padding-left: 20px; color: #37474f; }
    </style>
</head>
<body>

<div class="card">
    <!-- GİRİŞ EKRANI -->
    <div id="login-area">
        <h2>Hoş Geldiniz</h2>
        <p>Lütfen isminizi giriniz:</p>
        <input type="text" id="playerName" placeholder="Adınız..." autocomplete="off">
        <button onclick="startGame()">BAŞLA</button>
    </div>

    <!-- OYUN EKRANI -->
    <div id="game-area">
        <div id="progress" class="progress">Soru: 1 / 3</div>
        <div id="welcome-msg" style="font-weight:bold; color:#0d47a1; margin-bottom:10px;"></div>
        <div id="sentence"></div>
        <div id="hintDisplay" class="hint-box"></div>
        <input type="text" id="userInput" placeholder="Cevabı yaz..." autocomplete="off">
        <button onclick="checkAnswer()">KONTROL ET</button>
        <p id="message"></p>
    </div>
</div>

<!-- YÖNETİCİ BÖLÜMÜ -->
<button class="admin-btn" onclick="toggleAdmin()">📊 Kayıtlı İsimleri Gör</button>
<div id="admin-panel">
    <h3 style="margin-top:0">Giriş Yapanlar:</h3>
    <ul id="nameList"></ul>
    <button onclick="clearLogs()" style="background:#d32f2f; font-size:11px; padding:5px; width:auto">Kayıtları Sıfırla</button>
</div>

<script>
    let userName = "";
    const questions = [
        { sentence: "\"Uzun ince bir ____ gidiyorum, gündüz gece.\"", correct: "yoldayım" },
        { sentence: "Sadık yârimiz: \"Kara ____\".", correct: "toprak" },
        { sentence: "Veysel, bir halk ____.", correct: "ozanıdır" }
    ];

    let currentStep = 0;
    let hintCount = 0;

    function startGame() {
        const nameInput = document.getElementById('playerName').value.trim();
        if (nameInput.length < 2) return alert("Lütfen isim girin.");
        
        userName = nameInput;
        
        // localStorage Kaydı
        let players = JSON.parse(localStorage.getItem('veyse_players_blue') || "[]");
        players.push({ad: userName, tarih: new Date().toLocaleString()});
        localStorage.setItem('veyse_players_blue', JSON.stringify(players));

        document.getElementById('login-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentStep < questions.length) {
            hintCount = 0;
            document.getElementById('progress').innerText = `Soru: ${currentStep + 1} / ${questions.length}`;
            document.getElementById('welcome-msg').innerText = `Merhaba ${userName}! 👋`;
            document.getElementById('sentence').innerText = questions[currentStep].sentence;
            document.getElementById('userInput').value = "";
            document.getElementById('userInput').disabled = false;
            document.getElementById('userInput').focus();
            document.getElementById('message').innerText = "";
            updateHint();
        } else {
            document.getElementById('game-area').innerHTML = `<h2 style="color:#2196f3">Tebrikler ${userName}!</h2><p>Tüm soruları yanıtladın.</p><button onclick='location.reload()'>Yeniden Oyna</button>`;
        }
    }

    function updateHint() {
        const word = questions[currentStep].correct;
        let display = "";
        for (let i = 0; i < word.length; i++) display += (i < hintCount) ? word[i] : "_";
        document.getElementById('hintDisplay').innerText = display;
    }

    function checkAnswer() {
        const input = document.getElementById('userInput');
        const userVal = input.value.toLowerCase().trim();
        const target = questions[currentStep].correct;

        if (userVal === target) {
            document.getElementById('message').innerText = "Doğru! 🎉";
            document.getElementById('message').style.color = "#2e7d32";
            input.disabled = true;
            setTimeout(() => { currentStep++; loadQuestion(); }, 2000);
        } else {
            hintCount++;
            updateHint();
            if (hintCount >= target.length) {
                document.getElementById('message').innerText = `Cevap: ${target.toUpperCase()}`;
                document.getElementById('message').style.color = "#e65100";
                setTimeout(() => { currentStep++; loadQuestion(); }, 3000);
            } else {
                document.getElementById('message').innerText = "Yanlış, bir ipucu daha!";
                document.getElementById('message').style.color = "#c62828";
            }
        }
    }

    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        const list = document.getElementById('nameList');
        list.innerHTML = "";
        const players = JSON.parse(localStorage.getItem('veyse_players_blue') || "[]");
        players.forEach(p => {
            const li = document.createElement('li');
            li.innerText = `${p.ad} - ${p.tarih}`;
            list.appendChild(li);
        });
    }

    function clearLogs() {
        if(confirm("Tüm kayıtlar silinsin mi?")) {
            localStorage.removeItem('veyse_players_blue');
            toggleAdmin();
        }
    }

    document.getElementById("playerName").addEventListener("keyup", (e) => { if (e.key === "Enter") startGame(); });
    document.getElementById("userInput").addEventListener("keyup", (e) => { if (e.key === "Enter") checkAnswer(); });
</script>

</body>
</html>
